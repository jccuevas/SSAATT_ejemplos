<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="basico.css">
    <script src="clase-ssaatt.js" async></script>

<body>
    <header>
        <h1>Ejemplo</h1>

    <a onclick="stop(event)" href="https://www.google.com">Google</a>

        <button id="b-2" onclick="cambiar('2')">Cambiar 2</button>

    <main>
        <section id="section-1" class="visible">
            <h2>Sección 1</h2>

            <div onclick="propagacion(event)" id="contenedor">

                    <label for="name">Nombre</label><input id="name" type="text" name="name">
                    <label for="surname">Apellidos</label><input id="surname" type="text" name="surname">
                    <input type="submit" value="Enviar">
                </form>
            </div>


        </section>
        <section id="section-2" class="oculta">
            <h2>Sección 2</h2>
            <p id="texto2">Este es la sección 2</p>
        </section>
    </main>
    <button onclick="cambiarTexto('Hola<br>Adiós')">Pulsa</button>
    <button onclick="crearParrafo('Nuevo párrafo')">Crear</button>
    <button onclick="simularDescarga()">Descargar usuarios</button>
    <button onclick="lanzaTemporizador(event,2000)">Temporizador</button>
    <button id="vacio">Vacio</button>
    <div>
        <ul id="lista">

        </ul>
    </div>
